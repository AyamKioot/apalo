name: Build EXE
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install pyinstaller
    - run: pyinstaller --onefile --uac-admin fix_policy.py
    - uses: actions/upload-artifact@v4
      with:
        name: fix_policy
        path: dist/fix_policy.exe
